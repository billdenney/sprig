name: CI (macOS)
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-build-test:
    strategy:
      fail-fast: false
      matrix:
        macos: [macos-14, macos-15]
    runs-on: ${{ matrix.macos }}
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Swift toolchain
        # Hosted macOS runners default to whatever Swift ships with the image's
        # Xcode, which can lag our required 6.0+. SwiftyLab/setup-swift reads
        # our .swift-version and installs the exact toolchain — same pin as
        # ci-linux and local dev.
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"

      - name: Print Swift version (sanity)
        run: swift --version

      - name: Install lint tooling
        run: brew install swiftlint swiftformat

      - name: SwiftLint
        run: swiftlint --strict

      - name: SwiftFormat (check-only)
        run: swiftformat --lint .

      - name: Build packages
        run: swift build --configuration debug

      - name: Run tests
        run: swift test
