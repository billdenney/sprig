name: CI (macOS)
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-build-test:
    strategy:
      fail-fast: false
      matrix:
        macos: [macos-14, macos-15]
    runs-on: ${{ matrix.macos }}
    # Hard wall-clock cap. Hosted macOS runners have intermittently stalled
    # in `swift test` (FSEvents-related; see SprigctlWatchTests's CI-disabled
    # case). Without a cap, a stall consumes 6 h of runner time before
    # GHA's default timeout kicks in. 15 min is comfortably above the
    # ~3 min healthy total job time.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Select a Swift 6+ Xcode
        # GitHub's hosted macOS runners ship multiple Xcode versions at
        # well-known paths. We try the newest-available first and fail
        # fast if the selected toolchain is older than Swift 6 (our
        # Package.swift uses swift-tools-version: 6.0).
        run: |
          set -euo pipefail
          for app in \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode_16.app \
            /Applications/Xcode.app \
          ; do
            if [[ -d "$app" ]]; then
              echo "Selecting $app"
              sudo xcode-select -s "$app"
              break
            fi
          done
          swift --version
          major=$(swift -version 2>&1 | head -1 | sed -nE 's/.*Swift version ([0-9]+)\..*/\1/p')
          if [[ -z "$major" || "$major" -lt 6 ]]; then
            echo "::error::Need Swift 6 or newer; got $(swift -version 2>&1 | head -1)"
            exit 1
          fi

      - name: Install lint + benchmark tooling
        # `jemalloc` — package-benchmark links jemalloc on macOS too (the
        # `pkgConfig: "jemalloc"` system-library target in
        # ordo-one/package-jemalloc resolves via pkg-config + Homebrew).
        # No vendored macOS shim despite earlier docs suggesting otherwise.
        run: brew install swiftlint swiftformat jemalloc

      - name: SwiftLint
        run: swiftlint --strict

      - name: SwiftFormat (check-only)
        run: swiftformat --lint .

      - name: Build packages
        run: swift build --configuration debug

      - name: Run tests
        run: swift test

      - name: Smoke-build benchmarks
        # Just verify the benchmark target compiles. Full benchmark runs
        # happen nightly on the self-hosted runner (.github/workflows/
        # benchmarks.yml); hosted runners are too noisy for perf gates.
        run: swift build --target SprigCoreBenchmarks
