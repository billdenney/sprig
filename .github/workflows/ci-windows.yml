name: CI (Windows)
on:
  pull_request:
  push:
    branches: [main]

# Windows is a **first-class supported platform** for development and testing.
# At MVP the macOS app is the user-facing product, but `sprigctl` and the
# entire `packages/` graph (GitCore, RepoState, ConflictKit, AIKit, LFSKit,
# SubmoduleKit, SubtreeKit, SafetyKit, IPCSchema, PlatformKit, DiagKit,
# StatusKit, TaskWindowKit, UIKitShared, plus the WatcherKit polling watcher)
# are expected to build, test, and behave identically on Windows.
#
# What's still macOS-only: FSEventsWatcher (the macOS kernel-level watcher;
# Windows uses the portable PollingFileWatcher). A native
# ReadDirectoryChangesW-based watcher is a future improvement (ADR 0048).
# The macOS shell (FinderSync, LaunchAgent, Sparkle) is not in scope here —
# Windows will eventually get its own apps/windows/ shell post-1.0.

jobs:
  build-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.3-release
          tag: 6.3-RELEASE

      - name: Verify git is on PATH
        # The windows-2022 image ships Git for Windows pre-installed at
        # C:\Program Files\Git\bin\git.exe, which actions/runner-images puts
        # on PATH. We just sanity-check it here to fail fast with a clear
        # message if the image ever changes.
        shell: bash
        run: |
          git --version
          echo "git resolved to: $(which git)"

      - name: Build packages
        run: swift build

      - name: Run tests
        run: swift test
