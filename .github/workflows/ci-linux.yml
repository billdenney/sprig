name: CI (Linux — cross-platform guard for packages/)
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-portable:
    runs-on: ubuntu-24.04
    container:
      image: swift:6.3.1-noble   # pinned; matches .swift-version
    steps:
      - uses: actions/checkout@v4
      - name: Install git (GitCore tests shell out to the system git)
        # The swift:6.3.1-noble image doesn't include git by default.
        # Tests in GitCoreTests spawn real git for version probes,
        # init/status round-trips, and merge-conflict fixtures.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git
          git --version
      - name: Build packages (portable subset)
        # Tier 1 + protocol shells of Tier 2 must compile on Linux.
        # Mac-only adapter sources are excluded by #if os(macOS).
        run: swift build
      - name: Run tests (portable subset)
        run: swift test
