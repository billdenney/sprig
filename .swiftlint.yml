# Sprig SwiftLint configuration.
# Custom rules enforce the three-tier cross-platform boundaries (ADR 0048, 0053).

included:
  - apps
  - packages
  - tests
  - cli

excluded:
  - .build
  - .swiftpm
  - DerivedData

line_length:
  warning: 140
  error: 200

type_name:
  min_length: 2

identifier_name:
  min_length: 1
  excluded:
    - id
    - x
    - y
    - z
    - r
    - g
    - b

# --- Custom rules ---
#
# SwiftLint custom rules support `included`/`excluded` as regex path patterns
# (not glob). They only apply when a file's path matches `included` and does
# not match `excluded`. We rely on these to enforce ADR 0048 + 0053 boundaries:
#
#   - no AppKit / SwiftUI / FinderSync / Combine / ServiceManagement / Sparkle
#     imports in `packages/` (portable tier 1 + 2)
#   - no hardcoded user-home / platform paths in production code
#
# A third boundary — "no `#if os(...)` in portable package logic" — was tried
# as a custom rule but produced false positives for trivial cross-platform
# constants (PATH separator, executable name). That boundary is now enforced
# by: CLAUDE.md guidance, code review, and the Linux CI job that actually
# compiles `packages/` on a non-Apple toolchain (a real behavior divergence
# would break that build).

custom_rules:
  no_appkit_in_packages:
    name: "No AppKit/SwiftUI/Cocoa in packages/ (Tier 1-2 must be portable)"
    regex: '^import (AppKit|SwiftUI|Cocoa|FinderSync|Combine|ServiceManagement|Sparkle)\b'
    included:
      - "packages/"
    severity: error
    message: "Imports of AppKit/SwiftUI/Cocoa/FinderSync/Combine/ServiceManagement/Sparkle are banned in packages/. See ADR 0048, 0053 and CLAUDE.md."

  no_hardcoded_home_paths:
    name: "No hardcoded user-home or platform paths"
    regex: '("/Users/|"~/Library/|"\\\\AppData\\\\|"/home/)'
    included:
      - "packages/"
      - "apps/"
      - "cli/"
    excluded:
      - "Tests/"
      - "tests/fixtures/"
      - "docs/"
    severity: error
    message: "Hardcoded absolute paths are forbidden. Use PathResolver (ADR 0053)."
